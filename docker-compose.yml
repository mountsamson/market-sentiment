services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health/live"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: http://backend:5000
    ports:
      - "3000:3000"
    environment:
      # Runtime env (server-side only — not baked into the Next.js bundle)
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NEXT_PUBLIC_BACKEND_URL: http://backend:5000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
